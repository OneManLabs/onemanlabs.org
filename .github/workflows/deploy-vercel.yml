name: Deploy website to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Production deployment
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull production settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build production output
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy production output
        id: deploy
        run: |
          deployment_url="$(vercel deploy --prebuilt --prod --archive=tgz --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "### Vercel production deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "$deployment_url" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify production deployment
        run: curl --fail --silent --show-error --location --retry 5 --retry-delay 3 "${{ steps.deploy.outputs.deployment_url }}" --output /dev/null
